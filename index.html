<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e9f8ff" />
  <title>LinkWave - Apresentação</title>
  <link rel="icon" type="image/png" href="./imgs/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ink: #103244;
      --ink-strong: #071f2e;
      --muted: #5e8293;
      --soft: #e9f8ff;
      --white: rgba(255, 255, 255, 0.68);
      --white-strong: rgba(255, 255, 255, 0.88);
      --line: rgba(64, 160, 205, 0.22);
      --line-strong: rgba(64, 160, 205, 0.36);
      --cyan: #1bbff2;
      --sky: #54b8ff;
      --mint: #70efba;
      --green: #20cf84;
      --aero-shadow: 0 24px 70px rgba(66, 154, 196, 0.18);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(117, 220, 255, 0.36), transparent 32%),
        radial-gradient(circle at 80% 78%, rgba(112, 239, 186, 0.28), transparent 34%),
        linear-gradient(135deg, #f7fdff 0%, #dff5ff 44%, #e9fff6 100%);
    }

    body {
      display: grid;
      place-items: center;
    }

    h1, h2, h3, p { margin: 0; }
    button { font: inherit; }

    #root {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .presentation-stage {
      width: min(100vw, 177.777vh);
      height: min(100vh, 56.25vw);
      aspect-ratio: 16 / 9;
      margin: auto;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle at 16% 20%, rgba(103, 211, 255, 0.48), transparent 26%),
        radial-gradient(circle at 82% 28%, rgba(112, 239, 186, 0.32), transparent 28%),
        radial-gradient(circle at 58% 88%, rgba(103, 184, 255, 0.28), transparent 30%),
        linear-gradient(145deg, #f9feff 0%, #e5f8ff 38%, #e8fff7 100%);
      box-shadow: 0 28px 92px rgba(40, 118, 154, 0.2);
    }

    .aero-layer,
    .bubble-layer,
    .shine-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .aero-layer::before,
    .aero-layer::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
    }

    .aero-layer::before {
      width: 44%;
      aspect-ratio: 1;
      left: -10%;
      top: 8%;
      background: radial-gradient(circle, rgba(53, 196, 244, 0.26), transparent 66%);
    }

    .aero-layer::after {
      width: 42%;
      aspect-ratio: 1;
      right: -8%;
      bottom: -14%;
      background: radial-gradient(circle, rgba(64, 220, 154, 0.22), transparent 68%);
    }

    .shine-layer {
      background:
        linear-gradient(112deg, transparent 0%, rgba(255,255,255,0.56) 18%, transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.48), transparent 38%);
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.86);
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), rgba(255,255,255,0.24) 22%, rgba(104, 205, 245, 0.10) 54%, transparent 78%);
      box-shadow: inset 0 1px 4px rgba(255,255,255,0.7), 0 12px 28px rgba(72, 166, 207, 0.14);
      opacity: 0.58;
    }

    .brand-chip {
      position: absolute;
      left: 2.1%;
      top: 2.2%;
      z-index: 8;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 11px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 999px;
      color: #12374a;
      font-size: clamp(10px, 0.86vw, 13px);
      font-weight: 900;
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(18px) saturate(160%);
      box-shadow: 0 14px 32px rgba(51, 144, 188, 0.12), inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .brand-chip img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .presenter-card {
      position: absolute;
      top: clamp(14px, 2vw, 24px);
      right: clamp(18px, 2.6vw, 34px);
      z-index: 8;
      width: 88px;
      padding: 9px 10px 8px;
      border-radius: 14px;
      background: rgba(255,255,255,0.52);
      backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow:
        0 10px 26px rgba(56,189,248,0.12),
        inset 0 1px 0 rgba(255,255,255,0.95);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
    }

    .presenter-card .presenter-name {
      width: 100%;
      text-align: center;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      color: #059669;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .presenter-card .presenter-line {
      width: 100%;
      height: 1px;
      margin: 7px 0 6px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(3,105,161,.32),
        transparent
      );
    }

    .presenter-card .presenter-count {
      width: 100%;
      text-align: center;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      color: rgba(7,50,74,.62);
      letter-spacing: .08em;
    }

    .slide-area {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      align-items: center;
      padding: clamp(58px, 6vw, 86px) clamp(74px, 7.2vw, 112px) clamp(46px, 5vw, 74px);
      overflow: hidden;
    }

    .slide-content {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 0;
      display: grid;
      gap: clamp(18px, 2vw, 28px);
    }

    .slide-cinematic-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 72% 48%, rgba(255,255,255,0.2) 0%, rgba(36,160,255,0.14) 13%, rgba(2,9,18,0.74) 35%, rgba(0,3,9,0.96) 100%),
        radial-gradient(circle at 72% 48%, rgba(27,191,242,0.38), transparent 24%);
      mix-blend-mode: multiply;
    }

    .slide-cinematic-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 72% 48%, transparent 0 16%, rgba(0,0,0,0.24) 34%, rgba(0,0,0,0.72) 100%);
      opacity: 0.8;
    }

    .two-col {
      grid-template-columns: minmax(0, 0.94fr) minmax(0, 1.06fr);
      align-items: center;
      gap: clamp(42px, 5.8vw, 86px);
    }

    .stack {
      display: grid;
      gap: clamp(13px, 1.45vw, 20px);
      align-content: center;
      min-width: 0;
    }

    .center {
      justify-items: center;
      text-align: center;
    }

    .kicker {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.44);
      color: #159e77;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 12px 28px rgba(74, 168, 207, 0.11);
      font-size: clamp(10px, 0.86vw, 12px);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      backdrop-filter: blur(18px) saturate(170%);
    }

    .logo-tile {
      width: clamp(82px, 8.1vw, 122px);
      height: clamp(82px, 8.1vw, 122px);
      display: grid;
      place-items: center;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.82);
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.95), transparent 16%),
        linear-gradient(145deg, rgba(255,255,255,0.72), rgba(204, 244, 255, 0.42));
      box-shadow: 0 22px 52px rgba(57, 154, 201, 0.18), inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(20px) saturate(160%);
    }

    .logo-tile img {
      width: 76%;
      height: 76%;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(34, 146, 196, 0.2));
    }

    h1 {
      max-width: 760px;
      color: var(--ink-strong);
      font-size: clamp(58px, 7.5vw, 106px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: 0;
    }

    h2 {
      max-width: 850px;
      color: var(--ink-strong);
      font-size: clamp(28px, 4.2vw, 58px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h3 {
      color: #12374a;
      font-size: clamp(15px, 1.22vw, 19px);
      line-height: 1.15;
      font-weight: 900;
    }

    .lead {
      max-width: 720px;
      color: var(--muted);
      font-size: clamp(15px, 1.42vw, 21px);
      line-height: 1.42;
      font-weight: 650;
      text-wrap: balance;
    }

    .gradient-text {
      background: linear-gradient(120deg, #0b3144 0%, #15bbed 46%, #20cf84 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .names {
      color: #244a5c;
      font-size: clamp(14px, 1.22vw, 18px);
      font-weight: 900;
    }

    .glass {
      border: 1px solid rgba(255,255,255,0.84);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.78), rgba(255,255,255,0.34)),
        rgba(231, 249, 255, 0.42);
      box-shadow: var(--aero-shadow), inset 0 1px 0 rgba(255,255,255,0.92);
      backdrop-filter: blur(24px) saturate(170%);
    }

    .card-grid {
      display: grid;
      gap: clamp(12px, 1.3vw, 18px);
      min-width: 0;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }

    .card {
      min-height: 116px;
      padding: clamp(15px, 1.5vw, 22px);
      display: grid;
      align-content: start;
      gap: 9px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(128deg, rgba(255,255,255,0.56), transparent 40%);
      pointer-events: none;
    }

    .card > * { position: relative; }

    .card p,
    .small {
      color: #678898;
      font-size: clamp(11px, 0.96vw, 13px);
      line-height: 1.42;
      font-weight: 650;
    }

    .icon-img {
      width: clamp(26px, 2.3vw, 34px);
      height: clamp(26px, 2.3vw, 34px);
      object-fit: contain;
      filter: drop-shadow(0 8px 14px rgba(52, 134, 174, 0.16));
    }

    .icon-badge {
      width: clamp(36px, 3.4vw, 50px);
      height: clamp(36px, 3.4vw, 50px);
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 12px 26px rgba(62, 153, 194, 0.12);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 31px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.86);
      background: rgba(255,255,255,0.5);
      color: #255468;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
      font-size: clamp(11px, 0.92vw, 13px);
      font-weight: 850;
      white-space: nowrap;
    }

    .pill.mint {
      color: #07865e;
      background: rgba(217, 255, 239, 0.66);
    }

    .phone-shell {
      position: relative;
      display: grid;
      place-items: center;
      min-height: clamp(390px, 42vw, 530px);
      perspective: 1200px;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .solution-showcase {
      grid-template-columns: minmax(0, 0.72fr) minmax(0, 1.28fr);
      gap: clamp(28px, 4vw, 62px);
    }

    .phone-shell.focus {
      min-height: clamp(470px, 48vw, 610px);
      perspective: 1500px;
    }

    .phone-glow {
      position: absolute;
      width: 62%;
      aspect-ratio: 1;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(70, 196, 245, 0.24), transparent 58%),
        radial-gradient(circle at 68% 60%, rgba(77, 234, 166, 0.2), transparent 48%);
      filter: blur(24px);
      opacity: 0.72;
    }

    .phone-glow.cinematic {
      animation: phoneGlowIntro 3.2s cubic-bezier(0.22, 1, 0.36, 1) both, phoneGlowBreathe 4.8s ease-in-out 3.2s infinite alternate;
    }

    .phone-flare {
      position: absolute;
      width: 34%;
      aspect-ratio: 1;
      border-radius: 999px;
      background:
        radial-gradient(circle at 36% 34%, rgba(255,255,255,0.92), rgba(108, 216, 255, 0.34) 28%, rgba(112, 239, 186, 0.18) 54%, transparent 72%);
      filter: blur(16px);
      mix-blend-mode: screen;
      opacity: 0;
      animation: phoneFlareIntro 2.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    .phone-shell.focus .phone-glow {
      width: 54%;
      filter: blur(22px);
    }

    .phone-wave {
      position: absolute;
      width: 52%;
      aspect-ratio: 1;
      border-radius: 999px;
      border: 1px solid rgba(27, 191, 242, 0.2);
      box-shadow: 0 0 48px rgba(27, 191, 242, 0.14), inset 0 0 32px rgba(112, 239, 186, 0.1);
      opacity: 0;
      transform: rotateX(62deg);
    }

    .phone-wave.wave-2 {
      width: 66%;
      border-color: rgba(32, 207, 132, 0.16);
    }

    .phone-wave.wave-3 {
      width: 78%;
      border-color: rgba(84, 184, 255, 0.14);
    }

    .phone-energy-ring {
      position: absolute;
      width: 34%;
      aspect-ratio: 1;
      border-radius: 999px;
      border: 2px solid rgba(133, 245, 217, 0.92);
      background: radial-gradient(circle, rgba(27,191,242,0.18), transparent 60%);
      box-shadow:
        0 0 34px rgba(27,191,242,0.62),
        0 0 70px rgba(32,207,132,0.42),
        inset 0 0 26px rgba(255,255,255,0.54);
      transform: rotateX(64deg);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .phone-wrap {
      position: relative;
      width: clamp(218px, 20.2vw, 292px);
      aspect-ratio: 500 / 938;
      transform-style: preserve-3d;
      transform-origin: center center;
      filter: drop-shadow(0 28px 34px rgba(34, 102, 132, 0.24));
      will-change: transform, filter, opacity;
    }

    .phone-wrap.cinematic {
      animation: none;
    }

    .phone-wrap.demo-spin {
      width: clamp(246px, 22.8vw, 334px);
      animation: none;
    }

    .phone-device {
      position: absolute;
      inset: 0;
      transform-origin: center center;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .phone-light-sweep {
      position: absolute;
      inset: 0;
      z-index: 5;
      border-radius: 36px;
      pointer-events: none;
      background: linear-gradient(
        110deg,
        transparent 14%,
        rgba(255,255,255,0.12) 20%,
        rgba(255,255,255,0.78) 27%,
        rgba(255,255,255,0.95) 30%,
        rgba(255,255,255,0.24) 38%,
        transparent 46%
      );
      background-size: 310% 100%;
      background-position: 110% 0;
      opacity: 0;
      animation:
        phoneLightSweep 2.6s cubic-bezier(0.22, 1, 0.36, 1) 0.55s both,
        phoneLightBreathe 5.4s ease-in-out 3.3s infinite alternate;
      mix-blend-mode: screen;
    }

    @keyframes phoneEntrance {
      0% {
        transform: perspective(1300px) translate3d(0, 10px, -520px) rotateY(42deg) rotateX(-14deg) rotateZ(5deg) scale(0.08);
        filter: blur(18px) saturate(120%);
        opacity: 0;
      }
      7% {
        transform: perspective(1200px) translate3d(0, 2px, -360px) rotateY(34deg) rotateX(-10deg) rotateZ(3deg) scale(0.16);
        filter: blur(13px) saturate(125%);
        opacity: 1;
      }
      18% {
        transform: perspective(1000px) translate3d(0, -8px, -130px) rotateY(17deg) rotateX(-5deg) rotateZ(1deg) scale(0.56);
        filter: blur(5px) saturate(130%);
      }
      32% {
        transform: perspective(850px) translate3d(0, -4px, 20px) rotateY(-2deg) rotateX(3deg) rotateZ(-1.5deg) scale(1.08);
        filter: blur(0) saturate(112%);
      }
      48% {
        transform: perspective(850px) translate3d(0, 3px, -8px) rotateY(-5deg) rotateX(4deg) rotateZ(-2.5deg) scale(0.98);
      }
      68% {
        transform: perspective(850px) translate3d(0, -6px, 0) rotateY(-2deg) rotateX(2deg) rotateZ(-1.8deg) scale(1.01);
      }
      100% {
        transform: perspective(850px) translate3d(0, 0, 0) rotateY(-2deg) rotateX(2deg) rotateZ(-1.6deg) scale(1);
        filter: blur(0) saturate(108%);
        opacity: 1;
      }
    }

    @keyframes phoneFloatHD {
      0% { transform: perspective(850px) rotateY(-2.6deg) rotateX(2.4deg) rotateZ(-1.6deg) translateY(0); }
      22% { transform: perspective(850px) rotateY(0deg) rotateX(-1deg) rotateZ(0.4deg) translateY(-8px); }
      44% { transform: perspective(850px) rotateY(2.4deg) rotateX(-2deg) rotateZ(1.6deg) translateY(-15px); }
      64% { transform: perspective(850px) rotateY(3.2deg) rotateX(-0.5deg) rotateZ(2.2deg) translateY(-10px); }
      82% { transform: perspective(850px) rotateY(-2.8deg) rotateX(2.6deg) rotateZ(-2.2deg) translateY(-4px); }
      100% { transform: perspective(850px) rotateY(-1.4deg) rotateX(1.6deg) rotateZ(-1deg) translateY(0); }
    }

    @keyframes phoneShowcase360 {
      0% {
        transform: perspective(1400px) translate3d(0, 18px, -460px) rotateY(-42deg) rotateX(-10deg) rotateZ(4deg) scale(0.18);
        filter: blur(16px) saturate(128%);
        opacity: 0;
      }
      12% {
        transform: perspective(1200px) translate3d(0, 0, -130px) rotateY(54deg) rotateX(-4deg) rotateZ(1deg) scale(0.78);
        filter: blur(4px) saturate(130%);
        opacity: 1;
      }
      30% {
        transform: perspective(1000px) translate3d(0, -10px, 40px) rotateY(178deg) rotateX(2deg) rotateZ(-1deg) scale(1.04);
        filter: blur(0) saturate(116%);
      }
      48% {
        transform: perspective(1000px) translate3d(0, -14px, 58px) rotateY(312deg) rotateX(4deg) rotateZ(-2deg) scale(1.08);
      }
      66% {
        transform: perspective(920px) translate3d(0, -2px, 0) rotateY(365deg) rotateX(2deg) rotateZ(-1.4deg) scale(1);
      }
      82% {
        transform: perspective(900px) translate3d(0, -7px, 0) rotateY(356deg) rotateX(1deg) rotateZ(-1.7deg) scale(1.015);
      }
      100% {
        transform: perspective(900px) translate3d(0, 0, 0) rotateY(360deg) rotateX(2deg) rotateZ(-1.3deg) scale(1);
        filter: blur(0) saturate(110%);
        opacity: 1;
      }
    }

    @keyframes phoneWaveOrbit {
      0% { opacity: 0; transform: rotateX(62deg) scale(0.18) rotateZ(0deg); }
      12% { opacity: 0.64; }
      52% { opacity: 0.36; transform: rotateX(62deg) scale(1.08) rotateZ(230deg); }
      100% { opacity: 0; transform: rotateX(62deg) scale(1.35) rotateZ(360deg); }
    }

    @keyframes phoneGlowIntro {
      0% { opacity: 0; transform: scale(0.28); filter: blur(12px); }
      18% { opacity: 0.92; transform: scale(1.28); filter: blur(34px); }
      42% { opacity: 0.76; transform: scale(0.92); filter: blur(24px); }
      100% { opacity: 0.7; transform: scale(1); filter: blur(24px); }
    }

    @keyframes phoneGlowBreathe {
      0% { opacity: 0.56; transform: scale(0.96); }
      100% { opacity: 0.78; transform: scale(1.08); }
    }

    @keyframes phoneFlareIntro {
      0% { opacity: 0; transform: scale(0.2); }
      16% { opacity: 0.88; transform: scale(1.42); }
      54% { opacity: 0.35; transform: scale(0.88); }
      100% { opacity: 0; transform: scale(1.1); }
    }

    @keyframes phoneLightSweep {
      0% { opacity: 0; background-position: 108% 0; }
      14% { opacity: 0.9; }
      46% { opacity: 0.55; background-position: 20% 0; }
      72% { opacity: 0.14; background-position: 0% 0; }
      100% { opacity: 0.07; background-position: 0% 0; }
    }

    @keyframes phoneLightBreathe {
      0% { opacity: 0.035; background-position: 0% 0; }
      50% { opacity: 0.11; background-position: 34% 0; }
      100% { opacity: 0.045; background-position: 0% 0; }
    }

    .phone-frame {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .phone-screen {
      position: absolute;
      top: 8.6%;
      left: 10.5%;
      z-index: 1;
      width: 79%;
      height: 82%;
      padding: 14% 5% 6%;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      border-radius: 18px;
      background:
        radial-gradient(circle at 44% 0%, rgba(255,255,255,0.78), transparent 31%),
        radial-gradient(circle at 50% 15%, rgba(75, 198, 241, 0.24), transparent 42%),
        linear-gradient(180deg, rgba(236, 253, 255, 0.72), rgba(192, 239, 229, 0.52));
      backdrop-filter: blur(22px) saturate(170%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92);
    }

    .phone-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 16%, rgba(255,255,255,0.55), transparent 9%),
        linear-gradient(116deg, transparent 0%, rgba(255,255,255,0.52) 20%, transparent 38%);
      opacity: 0.44;
      pointer-events: none;
    }

    .phone-screen.cosmic-page {
      padding: 6% 5% 5%;
      align-items: stretch;
      gap: 5px;
      background:
        radial-gradient(ellipse at 24% 18%, rgba(30,90,220,0.42), transparent 48%),
        radial-gradient(ellipse at 78% 70%, rgba(12,48,160,0.36), transparent 48%),
        linear-gradient(145deg, #020812 0%, #07152e 48%, #010408 100%);
      box-shadow: inset 0 1px 0 rgba(90, 150, 255, 0.24);
      color: #ffffff;
    }

    .phone-screen.cosmic-page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle at 70% 18%, rgba(185,218,255,0.75) 0 1px, transparent 1.5px),
        radial-gradient(circle at 42% 34%, rgba(255,255,255,0.58) 0 0.8px, transparent 1.2px),
        radial-gradient(circle at 84% 46%, rgba(185,218,255,0.7) 0 1px, transparent 1.5px),
        radial-gradient(circle at 24% 62%, rgba(255,255,255,0.62) 0 0.9px, transparent 1.3px),
        radial-gradient(circle at 64% 78%, rgba(185,218,255,0.64) 0 1px, transparent 1.5px);
      opacity: 0.72;
      animation: cosmicStars 4.8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .phone-screen.cosmic-page::after {
      background:
        linear-gradient(135deg, rgba(30,90,220,0.2), transparent 48%, rgba(15,50,180,0.18)),
        linear-gradient(116deg, transparent 0%, rgba(255,255,255,0.16) 22%, transparent 40%);
      opacity: 0.65;
    }

    @keyframes cosmicStars {
      0% { opacity: 0.44; transform: translateY(0); }
      100% { opacity: 0.86; transform: translateY(-3px); }
    }

    .force-node {

      backdrop-filter: blur(20px) saturate(170%);

      font-size: clamp(11px, 0.94vw, 14px);

      cursor: default;
      transform: translate(-50%, -50%);

      user-select: none;
      will-change: left, top, transform;

    .force-node img {

      transform: translate(-50%, -50%) scale(1.05);
      border-color: rgba(32,207,132,0.72);

    function parseCsvTable(text) {
      const rows = {};
      text.split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line && line.replace(/,/g, "").trim())
        .forEach((line) => {
          const [key, ...values] = line.split(",").map((value) => value.trim());
          rows[key] = values;
        });
      return rows;
    }

    function countBy(values, normalize = (value) => value) {
      return values.reduce((acc, raw) => {
        const key = normalize(raw);
        if (!key) return acc;
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function curvedEdgePath(link, index) {
      const source = link.source;
      const target = link.target;
      if (!source || !target) return "";
      const sx = source.x ?? 0;
      const sy = source.y ?? 0;
      const tx = target.x ?? 0;
      const ty = target.y ?? 0;
      const dx = tx - sx;
      const dy = ty - sy;
      const distance = Math.max(1, Math.sqrt(dx * dx + dy * dy));
      const normalX = -dy / distance;
      const normalY = dx / distance;
      const curve = Math.min(36, distance * 0.12) * (index % 2 ? 1 : -1);
      const cx = (sx + tx) / 2 + normalX * curve;
      const cy = (sy + ty) / 2 + normalY * curve;
      return `M ${sx} ${sy} Q ${cx} ${cy} ${tx} ${ty}`;
    }

    function buildOrbitalGraph(width, height, elapsedSeconds, sourceNodes = graphNodes) {
      const centerX = width / 2;
      const centerY = height / 2;
      const padX = 86;
      const padY = 66;
      const orbitNodes = sourceNodes.filter((node) => !node.hub);
      const orbitSpeed = elapsedSeconds * 0.105;
      const rx = Math.max(188, Math.min(width * 0.36, width / 2 - padX));
      const ry = Math.max(132, Math.min(height * 0.33, height / 2 - padY));

      const nodes = sourceNodes.map((node) => {
        if (node.hub) {
          return {
            ...node,
            x: centerX + Math.sin(elapsedSeconds * 0.62) * 1.6,
            y: centerY + Math.cos(elapsedSeconds * 0.58) * 1.4,
          };
        }

        const orbitIndex = orbitNodes.findIndex((orbitNode) => orbitNode.id === node.id);
        const baseAngle = -Math.PI / 2 + orbitIndex * ((Math.PI * 2) / orbitNodes.length);
        const angle = baseAngle + orbitSpeed;
        const radialBreath = Math.sin(elapsedSeconds * 0.84 + orbitIndex * 1.37) * 4.5;
        const tangentBreath = Math.cos(elapsedSeconds * 0.72 + orbitIndex * 0.91) * 2.2;
        const x = centerX + Math.cos(angle) * (rx + radialBreath) + Math.cos(angle + Math.PI / 2) * tangentBreath;
        const y = centerY + Math.sin(angle) * (ry + radialBreath) + Math.sin(angle + Math.PI / 2) * tangentBreath;

        return {
          ...node,
          x: Math.max(padX, Math.min(width - padX, x)),
          y: Math.max(padY, Math.min(height - padY, y)),
        };
      });

      const nodeById = Object.fromEntries(nodes.map((node) => [node.id, node]));
      const links = sourceNodes.filter((node) => !node.hub).map((node) => ({ source: "linkwave", target: node.id })).map((link) => ({
        ...link,
        source: nodeById[link.source],
        target: nodeById[link.target],
      }));

      return { width, height, nodes, links };
    }

    function ForceDirectedLinkGraph({ simplified = false } = {}) {
      const containerRef = useRef(null);
      const [graph, setGraph] = useState({ nodes: [], links: [], width: 0, height: 0 });
      const [hovered, setHovered] = useState(null);

      useEffect(() => {
        const container = containerRef.current;
        if (!container) return undefined;
        let animationFrame = 0;
        let width = 620;
        let height = 430;
        const startedAt = performance.now();

        const updateSize = () => {
          const rect = container.getBoundingClientRect();
          width = Math.max(520, rect.width);
          height = Math.max(380, rect.height);
        };

        const renderOrbit = (now) => {
          const finalNodeIds = new Set(["linkwave","instagram","youtube","tiktok","github","whatsapp","portfolio"]);
          const sourceNodes = simplified ? graphNodes.filter((node) => finalNodeIds.has(node.id)) : graphNodes;
          setGraph(buildOrbitalGraph(width, height, (now - startedAt) / 1000, sourceNodes));
          animationFrame = requestAnimationFrame(renderOrbit);
        };

        updateSize();
        const resizeObserver = new ResizeObserver(updateSize);
        resizeObserver.observe(container);
        animationFrame = requestAnimationFrame(renderOrbit);

        return () => {
          resizeObserver.disconnect();
          cancelAnimationFrame(animationFrame);
        };
      }, []);

      const activeAll = hovered === "linkwave";
      const isNodeActive = (nodeId) => !hovered || activeAll || nodeId === "linkwave" || hovered === nodeId;
      const isLinkActive = (link) => {
        const sourceId = typeof link.source === "string" ? link.source : link.source?.id;
        const targetId = typeof link.target === "string" ? link.target : link.target?.id;
        return activeAll || !hovered || sourceId === hovered || targetId === hovered;
      };

      return h("div", { className: "force-graph", ref: containerRef },
        h("svg", { viewBox: `0 0 ${graph.width || 620} ${graph.height || 430}`, preserveAspectRatio: "none", "aria-hidden": "true" },

              d: curvedEdgePath(link, index),

            key: `${node.id}-particle`,
            className: "graph-particle",
            style: { left: node.x, top: node.y },
            animate: { scale: [0.85, 1.2, 0.85], opacity: [0.38, 0.82, 0.38] },
            transition: { duration: 2.6, repeat: Infinity, delay: node.radius * 0.01 },
          })
        ),
        graph.nodes.map((node) =>
          h("div", {
            key: node.id,
            className: `force-node ${node.hub ? "hub" : ""} ${hovered ? (isNodeActive(node.id) ? "active" : "dimmed") : ""}`,
            style: { left: node.x, top: node.y },
            onMouseEnter: () => setHovered(node.id),
            onMouseLeave: () => setHovered(null),
          },
            h("img", { src: node.icon, alt: "" }),
            h("span", null, node.label)
          )
        )
      );
    }

          }, h(ForceDirectedLinkGraph, { simplified: true })),
          h(FinalAnalyticsPanel, { data: dashboardData || csvDashboard }),
          h(M.div, {
            className: "final-message",
            initial: { opacity: 0, x: "-50%", y: 35, scale: .96 },
            animate: { opacity: 1, x: "-50%", y: 0, scale: 1 },
            transition: { duration: .8, delay: 1.46, ease: [0.22, 1, 0.36, 1] }
          },
            h("div", { className: "final-badge" }, "CONCLUSÃO"),
            h("div", { className: "final-title" }, "Obrigado!"),
            h("p", { className: "final-copy" }, "Obrigado por acompanhar nossa apresentação. O LinkWave centraliza toda a presença digital em uma plataforma moderna, personalizável e escalável."),
            h("div", { className: "final-names" }, "Lucas • CAFÉ • Emy"),
            h("div", { className: "final-cta" }, "Links para criadores, do seu jeito.")
          )
        )
      ),
    ];

    function App() {
      const [[current, direction], setSlide] = useState([0, 1]);
      const [dashboardData, setDashboardData] = useState(csvDashboard);
      const CurrentSlide = slides[current];

      const setCurrent = (next) => {
        setSlide(([prev]) => {
          const safeNext = Math.max(0, Math.min(slides.length - 1, next));
          if (safeNext === prev) return [prev, 0];
          return [safeNext, safeNext > prev ? 1 : -1];
        });
      };

      useEffect(() => {
        fetch("dados.csv")
          .then((response) => response.ok ? response.text() : Promise.reject(new Error("CSV unavailable")))
          .then((text) => setDashboardData(buildDashboardFromCsv(text)))
          .catch(() => setDashboardData(csvDashboard));
      }, []);

      useEffect(() => {
        const onKey = (event) => {
          if (event.code === "Space") {
            event.preventDefault();
            setCurrent(current + (event.shiftKey ? -1 : 1));
          } else if (event.key === "ArrowDown" || event.key === "PageDown") {
            event.preventDefault();
            setCurrent(current + 1);
          } else if (event.key === "ArrowUp" || event.key === "PageUp") {
            event.preventDefault();
            setCurrent(current - 1);
          } else if (event.key.toLowerCase() === "f") {
            event.preventDefault();
            document.fullscreenElement ? document.exitFullscreen?.() : document.documentElement.requestFullscreen?.();
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [current]);

      return h(Shell, { current, setCurrent },
        h("main", { className: "slide-area", "aria-live": "polite" },
          h(AnimatePresence, { mode: "wait", custom: direction },
            h(CurrentSlide, { key: current, direction, dashboardData })
          )
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
