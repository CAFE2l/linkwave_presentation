<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e9f8ff" />
  <title>LinkWave - Apresentação</title>
  <link rel="icon" type="image/png" href="./imgs/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ink: #103244;
      --ink-strong: #071f2e;
      --muted: #5e8293;
      --soft: #e9f8ff;
      --white: rgba(255, 255, 255, 0.68);
      --white-strong: rgba(255, 255, 255, 0.88);
      --line: rgba(64, 160, 205, 0.22);
      --line-strong: rgba(64, 160, 205, 0.36);
      --cyan: #1bbff2;
      --sky: #54b8ff;
      --mint: #70efba;
      --green: #20cf84;
      --aero-shadow: 0 24px 70px rgba(66, 154, 196, 0.18);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(117, 220, 255, 0.36), transparent 32%),
        radial-gradient(circle at 80% 78%, rgba(112, 239, 186, 0.28), transparent 34%),
        linear-gradient(135deg, #f7fdff 0%, #dff5ff 44%, #e9fff6 100%);
    }

    body {
      display: grid;
      place-items: center;
    }

    h1, h2, h3, p { margin: 0; }
    button { font: inherit; }

    #root {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .presentation-stage {
      width: min(100vw, 177.777vh);
      height: min(100vh, 56.25vw);
      aspect-ratio: 16 / 9;
      margin: auto;
      overflow: hidden;
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle at 16% 20%, rgba(103, 211, 255, 0.48), transparent 26%),
        radial-gradient(circle at 82% 28%, rgba(112, 239, 186, 0.32), transparent 28%),
        radial-gradient(circle at 58% 88%, rgba(103, 184, 255, 0.28), transparent 30%),
        linear-gradient(145deg, #f9feff 0%, #e5f8ff 38%, #e8fff7 100%);
      box-shadow: 0 28px 92px rgba(40, 118, 154, 0.2);
    }

    .aero-layer,
    .bubble-layer,
    .shine-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .aero-layer::before,
    .aero-layer::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
    }

    .aero-layer::before {
      width: 44%;
      aspect-ratio: 1;
      left: -10%;
      top: 8%;
      background: radial-gradient(circle, rgba(53, 196, 244, 0.26), transparent 66%);
    }

    .aero-layer::after {
      width: 42%;
      aspect-ratio: 1;
      right: -8%;
      bottom: -14%;
      background: radial-gradient(circle, rgba(64, 220, 154, 0.22), transparent 68%);
    }

    .shine-layer {
      background:
        linear-gradient(112deg, transparent 0%, rgba(255,255,255,0.56) 18%, transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.48), transparent 38%);
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.86);
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), rgba(255,255,255,0.24) 22%, rgba(104, 205, 245, 0.10) 54%, transparent 78%);
      box-shadow: inset 0 1px 4px rgba(255,255,255,0.7), 0 12px 28px rgba(72, 166, 207, 0.14);
      opacity: 0.58;
    }

    .brand-chip {
      position: absolute;
      left: 2.1%;
      top: 2.2%;
      z-index: 8;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 11px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 999px;
      color: #12374a;
      font-size: clamp(10px, 0.86vw, 13px);
      font-weight: 900;
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(18px) saturate(160%);
      box-shadow: 0 14px 32px rgba(51, 144, 188, 0.12), inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .brand-chip img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .counter {
      position: absolute;
      right: 2.1%;
      top: 2.2%;
      z-index: 8;
      min-width: 92px;
      display: grid;
      gap: 5px;
      padding: 9px 11px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.44);
      backdrop-filter: blur(22px) saturate(170%);
      box-shadow: 0 16px 38px rgba(51, 144, 188, 0.14), inset 0 1px 0 rgba(255,255,255,0.9);
      text-align: right;
    }

    .counter strong {
      color: var(--green);
      font-size: clamp(9px, 0.78vw, 11px);
      line-height: 1;
      text-transform: uppercase;
    }

    .counter span {
      color: #4f7484;
      font-size: clamp(10px, 0.86vw, 12px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    .slide-area {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      align-items: center;
      padding: clamp(58px, 6vw, 86px) clamp(74px, 7.2vw, 112px) clamp(46px, 5vw, 74px);
    }

    .slide-content {
      width: 100%;
      min-height: 0;
      display: grid;
      gap: clamp(18px, 2vw, 28px);
    }

    .two-col {
      grid-template-columns: minmax(0, 0.94fr) minmax(0, 1.06fr);
      align-items: center;
      gap: clamp(42px, 5.8vw, 86px);
    }

    .stack {
      display: grid;
      gap: clamp(13px, 1.45vw, 20px);
      align-content: center;
      min-width: 0;
    }

    .center {
      justify-items: center;
      text-align: center;
    }

    .kicker {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.44);
      color: #159e77;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 12px 28px rgba(74, 168, 207, 0.11);
      font-size: clamp(10px, 0.86vw, 12px);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      backdrop-filter: blur(18px) saturate(170%);
    }

    .logo-tile {
      width: clamp(82px, 8.1vw, 122px);
      height: clamp(82px, 8.1vw, 122px);
      display: grid;
      place-items: center;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.82);
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,0.95), transparent 16%),
        linear-gradient(145deg, rgba(255,255,255,0.72), rgba(204, 244, 255, 0.42));
      box-shadow: 0 22px 52px rgba(57, 154, 201, 0.18), inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(20px) saturate(160%);
    }

    .logo-tile img {
      width: 76%;
      height: 76%;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(34, 146, 196, 0.2));
    }

    h1 {
      max-width: 760px;
      color: var(--ink-strong);
      font-size: clamp(58px, 7.5vw, 106px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: 0;
    }

    h2 {
      max-width: 850px;
      color: var(--ink-strong);
      font-size: clamp(28px, 4.2vw, 58px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h3 {
      color: #12374a;
      font-size: clamp(15px, 1.22vw, 19px);
      line-height: 1.15;
      font-weight: 900;
    }

    .lead {
      max-width: 720px;
      color: var(--muted);
      font-size: clamp(15px, 1.42vw, 21px);
      line-height: 1.42;
      font-weight: 650;
      text-wrap: balance;
    }

    .gradient-text {
      background: linear-gradient(120deg, #0b3144 0%, #15bbed 46%, #20cf84 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .names {
      color: #244a5c;
      font-size: clamp(14px, 1.22vw, 18px);
      font-weight: 900;
    }

    .glass {
      border: 1px solid rgba(255,255,255,0.84);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.78), rgba(255,255,255,0.34)),
        rgba(231, 249, 255, 0.42);
      box-shadow: var(--aero-shadow), inset 0 1px 0 rgba(255,255,255,0.92);
      backdrop-filter: blur(24px) saturate(170%);
    }

    .card-grid {
      display: grid;
      gap: clamp(12px, 1.3vw, 18px);
      min-width: 0;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }

    .card {
      min-height: 116px;
      padding: clamp(15px, 1.5vw, 22px);
      display: grid;
      align-content: start;
      gap: 9px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(128deg, rgba(255,255,255,0.56), transparent 40%);
      pointer-events: none;
    }

    .card > * { position: relative; }

    .card p,
    .small {
      color: #678898;
      font-size: clamp(11px, 0.96vw, 13px);
      line-height: 1.42;
      font-weight: 650;
    }

    .icon-img {
      width: clamp(26px, 2.3vw, 34px);
      height: clamp(26px, 2.3vw, 34px);
      object-fit: contain;
      filter: drop-shadow(0 8px 14px rgba(52, 134, 174, 0.16));
    }

    .icon-badge {
      width: clamp(36px, 3.4vw, 50px);
      height: clamp(36px, 3.4vw, 50px);
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 12px 26px rgba(62, 153, 194, 0.12);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 31px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.86);
      background: rgba(255,255,255,0.5);
      color: #255468;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
      font-size: clamp(11px, 0.92vw, 13px);
      font-weight: 850;
      white-space: nowrap;
    }

    .pill.mint {
      color: #07865e;
      background: rgba(217, 255, 239, 0.66);
    }

    .phone-shell {
      position: relative;
      display: grid;
      place-items: center;
      min-height: clamp(390px, 42vw, 530px);
    }

    .phone-glow {
      position: absolute;
      width: 62%;
      aspect-ratio: 1;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(70, 196, 245, 0.24), transparent 58%),
        radial-gradient(circle at 68% 60%, rgba(77, 234, 166, 0.2), transparent 48%);
      filter: blur(24px);
      opacity: 0.72;
    }

    .phone-wrap {
      position: relative;
      width: clamp(218px, 20.2vw, 292px);
      aspect-ratio: 500 / 938;
      transform-style: preserve-3d;
      filter: drop-shadow(0 28px 34px rgba(34, 102, 132, 0.24));
    }

    .phone-frame {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .phone-screen {
      position: absolute;
      top: 8.6%;
      left: 10.5%;
      z-index: 1;
      width: 79%;
      height: 82%;
      padding: 14% 5% 6%;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      border-radius: 18px;
      background:
        radial-gradient(circle at 44% 0%, rgba(255,255,255,0.78), transparent 31%),
        radial-gradient(circle at 50% 15%, rgba(75, 198, 241, 0.24), transparent 42%),
        linear-gradient(180deg, rgba(236, 253, 255, 0.72), rgba(192, 239, 229, 0.52));
      backdrop-filter: blur(22px) saturate(170%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92);
    }

    .phone-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(116deg, transparent 0%, rgba(255,255,255,0.52) 20%, transparent 38%);
      opacity: 0.44;
      pointer-events: none;
    }

    .phone-avatar {
      width: 25%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.9);
      background: linear-gradient(145deg, #55cfff, #70efba);
      box-shadow: 0 0 0 3px rgba(65, 196, 240, 0.18), 0 12px 20px rgba(53, 145, 186, 0.16);
      z-index: 2;
    }

    .phone-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .phone-name {
      z-index: 2;
      margin-top: 5%;
      color: #15394b;
      font-size: clamp(12px, 1.08vw, 16px);
      font-weight: 900;
    }

    .phone-bio {
      z-index: 2;
      margin-top: 2%;
      margin-bottom: 7%;
      color: #5d7d8e;
      font-size: clamp(8px, 0.74vw, 11px);
      font-weight: 750;
      text-align: center;
    }

    .phone-link {
      z-index: 2;
      width: 92%;
      min-height: clamp(31px, 2.95vw, 39px);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.54);
      color: #22495a;
      font-size: clamp(8px, 0.76vw, 11px);
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.86), 0 8px 20px rgba(60, 143, 179, 0.1);
    }

    .phone-link img {
      width: 15px;
      height: 15px;
      object-fit: contain;
    }

    .phone-badge {
      z-index: 2;
      margin-top: auto;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(78, 214, 156, 0.38);
      background: rgba(220, 255, 240, 0.72);
      color: #09875e;
      font-size: clamp(8px, 0.72vw, 10px);
      font-weight: 900;
    }

    .link-cloud {
      position: relative;
      min-height: 430px;
      display: grid;
      place-items: center;
    }

    .cloud-center {
      width: clamp(124px, 12vw, 168px);
      height: clamp(124px, 12vw, 168px);
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.58);
      box-shadow: var(--aero-shadow), inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(20px) saturate(170%);
    }

    .cloud-center img {
      width: 68%;
      height: 68%;
      object-fit: contain;
    }

    .cloud-link {
      position: absolute;
      min-width: 136px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 12px;
      border-radius: 16px;
      color: #244a5c;
      font-size: clamp(11px, 0.96vw, 14px);
      font-weight: 900;
    }

    .connector {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 36%;
      height: 1px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(27,191,242,0.0), rgba(27,191,242,0.36), rgba(32,207,132,0.2));
    }

    .tech-card {
      min-height: 132px;
      align-content: center;
    }

    .tech-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tech-logo {
      width: clamp(32px, 3.1vw, 46px);
      height: clamp(32px, 3.1vw, 46px);
      object-fit: contain;
    }

    .flow {
      width: min(620px, 100%);
      justify-self: center;
      display: grid;
      gap: 7px;
    }

    .flow-node {
      min-height: 43px;
      display: grid;
      place-items: center;
      padding: 9px 14px;
      color: #14384a;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 900;
      text-align: center;
    }

    .arrow {
      text-align: center;
      color: #13a978;
      font-size: clamp(15px, 1.35vw, 20px);
      line-height: 1;
      font-weight: 900;
    }

    .db-card {
      min-height: 392px;
      align-content: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #14384a;
      font-size: clamp(14px, 1.36vw, 19px);
      font-weight: 800;
    }

    .db-tree {
      display: grid;
      gap: 10px;
    }

    .db-branch {
      display: grid;
      gap: 9px;
      margin-left: clamp(22px, 2.4vw, 38px);
      color: #2c6982;
    }

    .metric-card {
      min-height: 116px;
      align-content: center;
    }

    .metric-card strong {
      color: #15394b;
      font-size: clamp(22px, 2.5vw, 36px);
      line-height: 1;
    }

    .chart-card {
      min-height: 184px;
    }

    .bars {
      height: 100px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      align-items: end;
      gap: 9px;
      margin-top: 8px;
    }

    .bar {
      min-height: 16px;
      border-radius: 999px 999px 8px 8px;
      background: linear-gradient(180deg, #26c2f1, #70efba);
      box-shadow: 0 10px 18px rgba(36, 178, 219, 0.16);
    }

    .rank-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      color: #315f72;
      font-size: clamp(11px, 0.95vw, 13px);
      font-weight: 850;
    }

    .rank-line {
      height: 8px;
      border-radius: 999px;
      background: rgba(31, 161, 210, 0.14);
      overflow: hidden;
    }

    .rank-line span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #26c2f1, #70efba);
    }

    .geo-map {
      position: relative;
      min-height: 128px;
      margin-top: 10px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 38% 42%, rgba(38, 194, 241, 0.24), transparent 24%),
        radial-gradient(circle at 68% 62%, rgba(112, 239, 186, 0.22), transparent 22%),
        rgba(255,255,255,0.32);
      border: 1px solid rgba(255,255,255,0.72);
      overflow: hidden;
    }

    .geo-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #16c987;
      box-shadow: 0 0 0 6px rgba(22, 201, 135, 0.14), 0 0 18px rgba(22, 201, 135, 0.34);
    }

    .video-shell {
      width: 100%;
      max-width: 1040px;
      justify-self: center;
      aspect-ratio: 16 / 9;
      padding: clamp(14px, 1.5vw, 22px);
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.82);
      background:
        linear-gradient(rgba(84,184,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(84,184,255,0.08) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(27, 191, 242, 0.18), transparent 44%),
        rgba(255,255,255,0.34);
      background-size: 30px 30px, 30px 30px, auto, auto;
      text-align: center;
    }

    .play {
      width: clamp(62px, 5.8vw, 84px);
      height: clamp(62px, 5.8vw, 84px);
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.9);
      background: linear-gradient(145deg, rgba(255,255,255,0.78), rgba(207, 246, 255, 0.5));
      color: #159e77;
      box-shadow: 0 18px 42px rgba(53, 164, 207, 0.18), inset 0 1px 0 rgba(255,255,255,0.9);
      font-size: clamp(24px, 2.2vw, 32px);
    }

    .dots {
      position: absolute;
      right: 2.1%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 8;
      display: grid;
      gap: 9px;
    }

    .dot {
      width: 8px;
      height: 8px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(22, 107, 140, 0.22);
      cursor: pointer;
    }

    .progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9;
      height: 4px;
      background: rgba(255,255,255,0.52);
    }

    .progress-fill {
      height: 100%;
      border-radius: 0 999px 999px 0;
      background: linear-gradient(90deg, #25c6f4, #54b8ff, #70efba);
      box-shadow: 0 0 18px rgba(37, 198, 244, 0.38);
    }

    .hint {
      position: absolute;
      left: 2.1%;
      bottom: 2.4%;
      z-index: 8;
      color: rgba(36, 74, 92, 0.48);
      font-size: clamp(9px, 0.76vw, 11px);
      font-weight: 800;
    }

    @media (max-aspect-ratio: 4 / 3) {
      .slide {
        padding: 62px 44px 42px;
      }

      .two-col {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .grid-5,
      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .phone-shell {
        min-height: 330px;
      }

      .phone-wrap {
        width: 190px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useMemo, useState } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import { AnimatePresence, motion } from "https://esm.sh/framer-motion@11.18.2?deps=react@18.3.1,react-dom@18.3.1";

    const h = React.createElement;
    const M = motion;

    const localIcons = {
      Instagram: "imgs/icons/Instagram.png",
      YouTube: "imgs/icons/Youtube.png",
      TikTok: "imgs/icons/TikTok.png",
      WhatsApp: "imgs/icons/Whatsapp.png",
      LinkedIn: "imgs/icons/LinkedIn.png",
      GitHub: "imgs/icons/github.png",
      Portfolio: "imgs/icons/folder.png",
      Store: "imgs/icons/store.png",
    };

    const techs = [
      ["Next.js", "App Router, Server Actions e API Routes.", "https://cdn.simpleicons.org/nextdotjs/0B3144"],
      ["React", "Interface componentizada e estados previsíveis.", "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg"],
      ["TypeScript", "Tipagem para reduzir erros e melhorar manutenção.", "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-original.svg"],
      ["Tailwind CSS", "Sistema visual responsivo e consistente.", "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tailwindcss/tailwindcss-original.svg"],
      ["Supabase", "Auth, APIs e banco PostgreSQL gerenciado.", "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/supabase/supabase-original.svg"],
      ["PostgreSQL", "Modelo relacional para usuários, perfis, links e cliques.", "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg"],
      ["Zod", "Validação segura no servidor.", "https://cdn.simpleicons.org/zod/3E67B1"],
      ["Recharts", "Dashboards e gráficos analíticos.", "https://api.iconify.design/solar:chart-2-bold-duotone.svg?color=%231bbff2"],
      ["Framer Motion", "Transições, stagger, hover e microinterações.", "https://cdn.simpleicons.org/framer/1bbff2"],
      ["Playwright", "Testes ponta a ponta e validação de fluxos.", "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/playwright/playwright-original.svg"],
    ];

    // Plugar dados reais do Supabase aqui futuramente: substituir estes placeholders por dados vindos da API/Server Action de analytics.
    const analyticsPlaceholders = {
      users: "usuários",
      links: "links",
      clicks: "cliques",
      bars: [32, 48, 42, 66, 74, 58, 84],
      ranking: [["YouTube", "92%"], ["Loja online", "74%"], ["WhatsApp", "61%"]],
      geo: [[34, 42], [50, 36], [63, 52], [72, 64], [43, 65]],
    };

    const presenters = ["Lucas", "CAFÉ", "Emy"];
    const slideVariants = {
      enter: (direction) => ({ y: direction > 0 ? "100%" : "-100%", opacity: 0 }),
      center: { y: 0, opacity: 1 },
      exit: (direction) => ({ y: direction > 0 ? "-100%" : "100%", opacity: 0 }),
    };
    const groupVariants = {
      hidden: {},
      show: { transition: { staggerChildren: 0.07, delayChildren: 0.08 } },
    };
    const itemVariants = {
      hidden: { opacity: 0, y: 22 },
      show: { opacity: 1, y: 0, transition: { duration: 0.58, ease: [0.22, 1, 0.36, 1] } },
    };

    function Icon({ name }) {
      return h("img", { className: "icon-img", src: localIcons[name], alt: "", loading: "lazy" });
    }

    function Card({ children, className = "" }) {
      return h(M.article, {
        className: `glass card ${className}`,
        variants: itemVariants,
        whileHover: { y: -7, scale: 1.025, transition: { duration: 0.24 } },
      }, children);
    }

    function Kicker({ children }) {
      return h(M.div, { className: "kicker", variants: itemVariants }, children);
    }

    function PhoneMockup() {
      return h("div", { className: "phone-shell" },
        h(M.div, {
          className: "phone-glow",
          animate: { scale: [0.96, 1.05, 0.96], opacity: [0.58, 0.78, 0.58] },
          transition: { duration: 4.8, repeat: Infinity, ease: "easeInOut" },
        }),
        h(M.div, {
          className: "phone-wrap",
          animate: { y: [0, -13, 0], rotateX: [2, -1, 2], rotateY: [-3, 2, -3] },
          transition: { duration: 6.5, repeat: Infinity, ease: "easeInOut" },
          whileHover: { scale: 1.035, rotateY: 7, rotateX: -2 },
        },
          h("img", { className: "phone-frame", src: "./imgs/essential/frame.png", alt: "" }),
          h("div", { className: "phone-screen" },
            h("div", { className: "phone-avatar" }, h("img", { src: "./imgs/essential/profile.jpg", alt: "" })),
            h("div", { className: "phone-name" }, "CAFÉ"),
            h("div", { className: "phone-bio" }, "Criador digital - tecnologia - design"),
            [["LinkedIn", "Portfolio principal"], ["YouTube", "YouTube"], ["Instagram", "Loja online"], ["WhatsApp", "WhatsApp"]].map(([icon, label]) =>
              h(M.div, { className: "phone-link", key: label, whileHover: { x: 3 } }, h(Icon, { name: icon }), h("span", null, label))
            ),
            h("div", { className: "phone-badge" }, "analytics integrado")
          )
        )
      );
    }

    function Shell({ current, setCurrent, children }) {
      return h("div", { className: "presentation-stage" },
        h("div", { className: "aero-layer" }),
        h("div", { className: "shine-layer" }),
        h("div", { className: "bubble-layer" },
          [[8,10,11],[22,16,6],[75,18,9],[87,34,15],[52,50,12],[28,72,7],[92,82,6],[12,88,10]].map(([left, top, size], index) =>
            h(M.span, {
              key: index,
              className: "bubble",
              style: { left: `${left}%`, top: `${top}%`, width: `${size * 2}px`, height: `${size * 2}px` },
              animate: { y: [0, -16, 0], x: [0, index % 2 ? 8 : -8, 0] },
              transition: { duration: 5 + index * 0.4, repeat: Infinity, ease: "easeInOut" },
            })
          )
        ),
        h("div", { className: "brand-chip" }, h("img", { src: "imgs/icon.png", alt: "" }), "LinkWave"),
        h(M.div, { className: "counter", layout: true },
          h("strong", null, presenters[current % presenters.length]),
          h("span", null, `${String(current + 1).padStart(2, "0")} / 10`)
        ),
        children,
        h("div", { className: "dots" },
          Array.from({ length: 10 }).map((_, index) =>
            h(M.button, {
              key: index,
              className: "dot",
              type: "button",
              "aria-label": `Ir para slide ${index + 1}`,
              onClick: () => setCurrent(index),
              animate: {
                height: current === index ? 26 : 8,
                background: current === index ? "linear-gradient(180deg, #1bbff2, #70efba)" : "rgba(22, 107, 140, 0.22)",
              },
              whileHover: { scale: 1.25 },
            })
          )
        ),
        h("div", { className: "hint" }, "Espaco avanca - Shift + Espaco volta - F fullscreen"),
        h("div", { className: "progress" },
          h(M.div, {
            className: "progress-fill",
            animate: { width: `${((current + 1) / 10) * 100}%` },
            transition: { duration: 0.5, ease: [0.22, 1, 0.36, 1] },
          })
        )
      );
    }

    function SlideFrame({ children, direction = 1 }) {
      return h(M.section, {
        className: "slide",
        custom: direction,
        variants: slideVariants,
        initial: "enter",
        animate: "center",
        exit: "exit",
        transition: { duration: 0.72, ease: [0.22, 1, 0.36, 1] },
      }, h(M.div, { className: "slide-content", variants: groupVariants, initial: "hidden", animate: "show" }, children));
    }

    const slides = [
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content two-col" },
          h(M.div, { className: "stack", variants: groupVariants },
            h(M.div, { className: "logo-tile", variants: itemVariants }, h("img", { src: "imgs/icon.png", alt: "LinkWave" })),
            h(Kicker, null, "Apresentação técnica - 2026"),
            h(M.h1, { className: "gradient-text", variants: itemVariants }, "LinkWave"),
            h(M.p, { className: "lead", variants: itemVariants }, "Links para criadores, do seu jeito."),
            h(M.div, { className: "names", variants: itemVariants }, "Lucas • CAFÉ • Emy")
          ),
          h(M.div, { variants: itemVariants }, h(PhoneMockup))
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content two-col" },
          h("div", { className: "stack" },
            h(Kicker, null, "Problema"),
            h(M.h2, { variants: itemVariants }, "Links espalhados quebram clareza e conversão."),
            h(M.p, { className: "lead", variants: itemVariants }, "O público precisa encontrar muitos canais sem perder contexto.")
          ),
          h(M.div, { className: "link-cloud", variants: itemVariants },
            h(M.div, { className: "cloud-center", animate: { scale: [1, 1.04, 1] }, transition: { duration: 3.4, repeat: Infinity } }, h("img", { src: "imgs/icon.png", alt: "" })),
            [["Instagram", 4, 18, 18], ["YouTube", 64, 10, 145], ["TikTok", 72, 38, 198], ["GitHub", 56, 72, 55], ["Portfolio", 10, 66, -35], ["Store", 1, 42, -8], ["WhatsApp", 34, 4, 104]].map(([name, left, top, rot], index) =>
              h(React.Fragment, { key: name },
                h(M.div, { className: "connector", style: { transform: `rotate(${rot}deg)` }, initial: { scaleX: 0 }, animate: { scaleX: 1 }, transition: { delay: 0.2 + index * 0.05 } }),
                h(M.div, { className: "glass cloud-link", style: { left: `${left}%`, top: `${top}%` }, variants: itemVariants, whileHover: { y: -5 } }, h(Icon, { name }), name === "Portfolio" ? "Portfólio" : name === "Store" ? "Loja online" : name)
              )
            )
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content two-col" },
          h("div", { className: "stack" },
            h(Kicker, null, "Solução"),
            h(M.h2, { variants: itemVariants }, "Uma página profissional centraliza toda a presença digital."),
            h(M.div, { className: "pill-row", variants: itemVariants }, ["Perfil público", "Links", "Bio", "Redes sociais", "Tema visual", "Analytics"].map((x) => h("span", { className: "pill", key: x }, x)))
          ),
          h(M.div, { variants: itemVariants }, h(PhoneMockup))
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content" },
          h("div", { className: "stack" },
            h(Kicker, null, "Tecnologias"),
            h(M.h2, { variants: itemVariants }, "Stack moderna para produto, dados, segurança e testes.")
          ),
          h(M.div, { className: "card-grid grid-5", variants: groupVariants },
            techs.map(([name, desc, icon]) =>
              h(Card, { key: name, className: "tech-card" },
                h("div", { className: "tech-head" }, h("img", { className: "tech-logo", src: icon, alt: name }), h("h3", null, name)),
                h("p", null, desc)
              )
            )
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content two-col" },
          h("div", { className: "stack" },
            h(Kicker, null, "Arquitetura"),
            h(M.h2, { variants: itemVariants }, "A interface conversa com regras validadas antes do banco."),
            h(M.p, { className: "lead", variants: itemVariants }, "Fluxo baseado na documentação técnica do LinkWave.")
          ),
          h(M.div, { className: "flow", variants: groupVariants },
            ["Usuário", "Frontend Next.js", "Server Actions / API", "Zod", "Supabase Auth", "PostgreSQL", "UI"].map((step, index, arr) =>
              h(React.Fragment, { key: step },
                h(M.div, { className: "glass flow-node", variants: itemVariants, whileHover: { x: 5 } }, step),
                index < arr.length - 1 ? h(M.div, { className: "arrow", variants: itemVariants }, "↓") : null
              )
            )
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content two-col" },
          h("div", { className: "stack" },
            h(Kicker, null, "Banco de Dados"),
            h(M.h2, { variants: itemVariants }, "O modelo conecta usuários, perfis, links e cliques."),
            h(M.div, { className: "pill-row", variants: itemVariants }, ["PostgreSQL", "Supabase", "RLS", "Rate Limit", "Server Validation"].map((x, i) => h("span", { className: `pill ${i === 2 ? "mint" : ""}`, key: x }, x)))
          ),
          h(Card, { className: "db-card" },
            h("div", { className: "db-tree" },
              h("div", null, "auth.users"),
              h("div", null, "↓"),
              h("div", null, "public.users"),
              h("div", { className: "db-branch" },
                h("div", null, "├── public.profiles"),
                h("div", null, "├── public.links"),
                h("div", null, "├── public.clicks"),
                h("div", null, "└── registration_rate_limits")
              )
            )
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content" },
          h("div", { className: "stack" },
            h(Kicker, null, "Ciência de Dados / Analytics"),
            h(M.h2, { variants: itemVariants }, "Placeholders preparados para receber métricas reais.")
          ),
          h(M.div, { className: "card-grid grid-3", variants: groupVariants },
            [["Usuários", analyticsPlaceholders.users], ["Links", analyticsPlaceholders.links], ["Cliques", analyticsPlaceholders.clicks]].map(([label, value]) =>
              h(Card, { key: label, className: "metric-card" }, h("strong", null, value), h("p", null, label))
            )
          ),
          h(M.div, { className: "card-grid grid-3", variants: groupVariants },
            h(Card, { className: "chart-card" }, h("h3", null, "Evolução temporal"), h("div", { className: "bars" }, analyticsPlaceholders.bars.map((height, index) => h(M.span, { className: "bar", key: index, initial: { height: 0 }, animate: { height: `${height}%` }, transition: { delay: 0.2 + index * 0.05 } })))),
            h(Card, { className: "chart-card" }, h("h3", null, "Ranking de links"), h("div", { className: "rank-list" }, analyticsPlaceholders.ranking.map(([name, width]) => h("div", { className: "rank-item", key: name }, h("span", null, name), h("div", { className: "rank-line" }, h(M.span, { initial: { width: 0 }, animate: { width }, transition: { duration: 0.7 } })), h("span", null, "placeholder"))))),
            h(Card, { className: "chart-card" }, h("h3", null, "Geografia"), h("div", { className: "geo-map" }, analyticsPlaceholders.geo.map(([left, top], index) => h(M.span, { className: "geo-dot", key: index, style: { left: `${left}%`, top: `${top}%` }, animate: { scale: [1, 1.25, 1] }, transition: { duration: 2.2, repeat: Infinity, delay: index * 0.16 } }))))
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content center" },
          h(Kicker, null, "Demonstração em Vídeo"),
          h(M.h2, { variants: itemVariants }, "Demonstração do sistema"),
          h(M.section, { className: "glass video-shell", variants: itemVariants, whileHover: { scale: 1.01 } },
            h("div", { className: "video-placeholder" },
              h("div", null,
                h("div", { className: "play" }, "▶"),
                h("h3", null, "INSERIR VIDEO AQUI"),
                h("p", { className: "small", style: { marginTop: 10 } }, "Substitua este placeholder pela gravação de tela.")
              )
            )
            /* INSERIR VIDEO AQUI: use <video class="video-demo" controls src="./videos/demo-linkwave.mp4"></video> */
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content" },
          h("div", { className: "stack" },
            h(Kicker, null, "Resultados / Diferenciais"),
            h(M.h2, { variants: itemVariants }, "O LinkWave entrega uma experiência visual, segura e escalável.")
          ),
          h(M.div, { className: "card-grid grid-3", variants: groupVariants },
            [["Personalização", "Páginas com identidade própria."], ["UX moderna", "Frutiger Aero claro, leve e memorável."], ["Segurança", "RLS, autenticação e validação no servidor."], ["Analytics", "Base pronta para dashboards reais."], ["Performance", "Interface objetiva e responsiva."], ["Escalabilidade", "Arquitetura modular com Next.js e Supabase."]].map(([title, desc]) =>
              h(Card, { key: title }, h("h3", null, title), h("p", null, desc))
            )
          )
        )
      ),
      ({ direction }) => h(SlideFrame, { direction },
        h("div", { className: "slide-content center" },
          h(M.div, { className: "logo-tile", variants: itemVariants, whileHover: { rotate: 2, scale: 1.04 } }, h("img", { src: "imgs/icon.png", alt: "LinkWave" })),
          h(Kicker, null, "Conclusão"),
          h(M.h2, { className: "gradient-text", variants: itemVariants }, "Obrigado."),
          h(M.p, { className: "lead", variants: itemVariants }, "LinkWave centraliza presença digital, personalização e dados em uma experiência profissional."),
          h(M.div, { className: "names", variants: itemVariants }, "Lucas • CAFÉ • Emy")
        )
      ),
    ];

    function App() {
      const [[current, direction], setSlide] = useState([0, 1]);
      const CurrentSlide = slides[current];

      const setCurrent = (next) => {
        setSlide(([prev]) => {
          const safeNext = Math.max(0, Math.min(slides.length - 1, next));
          if (safeNext === prev) return [prev, 0];
          return [safeNext, safeNext > prev ? 1 : -1];
        });
      };

      useEffect(() => {
        const onKey = (event) => {
          if (event.code === "Space") {
            event.preventDefault();
            setCurrent(current + (event.shiftKey ? -1 : 1));
          } else if (event.key === "ArrowDown" || event.key === "PageDown") {
            event.preventDefault();
            setCurrent(current + 1);
          } else if (event.key === "ArrowUp" || event.key === "PageUp") {
            event.preventDefault();
            setCurrent(current - 1);
          } else if (event.key.toLowerCase() === "f") {
            event.preventDefault();
            document.fullscreenElement ? document.exitFullscreen?.() : document.documentElement.requestFullscreen?.();
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [current]);

      return h(Shell, { current, setCurrent },
        h("main", { className: "slide-area", "aria-live": "polite" },
          h(AnimatePresence, { mode: "wait", custom: direction },
            h(CurrentSlide, { key: current, direction })
          )
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
